name: CI

on:
  pull_request:
    paths:
      - '.github/**'
      - 'app/**'
  push:
    branches: ["main"]
    paths:
      - '.github/**'
      - 'app/**'

jobs:
  format:
    name: CSharpier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.101'

      - name: Restore tools
        run: dotnet tool restore
        working-directory: app

      - name: Check formatting
        run: dotnet csharpier check .
        working-directory: app

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.101'

      - name: Run unit tests
        run: dotnet test --filter "Category!=Integration" --logger "console;verbosity=normal"
        working-directory: app

      - name: Run integration tests
        run: dotnet test --filter "Category=Integration" --logger "console;verbosity=normal"
        working-directory: app
