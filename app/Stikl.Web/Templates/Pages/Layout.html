<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4"
    integrity="sha384-A986SAtodyH8eg8x8irJnYUk7i9inVQqYigD6qZ9evobksGNIXfeFvDwLSHcp31N"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>
  <link rel="stylesheet" href="/static/style.css">
  <title>{{title}}</title>
</head>

<body hx-ext="sse" hx-headers='{"X-CSRF-TOKEN": "{{csrfToken}}"}'>
  <nav>
    <ul>
      <li class="logo">
        <a hx-boost="true" href="/">Stikl</a>
      </li>
      <li>
        {{auth}}
      </li>
    </ul>
  </nav>
  <main>
    {{content}}
  </main>
  <div id="toasts">
    {{..toasts}}
  </div>
  <div id="modal"></div>
  <footer>
    Stikl - A very unfinished product
  </footer>
  <script>
    // HTMX skips htmx-added when the trigger is inside the swap target (e.g. login form).
    // Manually apply it so the enter-from-right CSS transition fires correctly.
    document.addEventListener("htmx:afterSwap", function (e) {
      var t = e.detail.target;
      if (t.tagName !== "MAIN") return;
      var els = [...t.children].filter(function (c) {
        return !c.classList.contains("htmx-added");
      });
      if (!els.length) return;
      els.forEach(function (c) {
        c.classList.add("htmx-added");
      });
      document.addEventListener(
        "htmx:afterSettle",
        function () {
          els.forEach(function (c) {
            c.classList.remove("htmx-added");
          });
        },
        { once: true }
      );
    });
  </script>
</body>

</html>
