  <search>
    <form 
      hx-get="/"
      hx-target="main"
      >
      <label for="query">Query</label>
      <input
          type="search"
          id="query"
          name="q"
          value="{{query?}}"
          placeholder="Search with me!"
          hx-trigger="search, input changed delay:500ms, keyup[key=='Enter']"
      />
      <button type="submit">Search</button>
  </search>
