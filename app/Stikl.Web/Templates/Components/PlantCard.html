<section class="PlantCard" hx-target="this" hx-swap="outerHTML">
  <img src="/images/species/regular/{{id}}.jpg" title="Image of {{commonName}}" />
  <ul class="Actions">
    <li>
      {{wantButton}}
    </li>
    <li>
      <button hx-post="{{url}}/have">
        ✓
      </button>
    </li>
  </ul>
  <h4>{{commonName}}</h4>
  <p class="ScientificName">{{scientificName}}</p>
  <p>
    Some info to be announced
  </p>
  <a class="Wiki" href="{{WikiLink}}">
    Wikipedia
  </a>
</section>
